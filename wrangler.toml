name = "torb-caserta"
compatibility_date = "2024-01-01"
pages_build_output_dir = "."

[[d1_databases]]
binding = "DB"
database_name = "torb-db"
database_id = "d259e0b1-8d8a-4f1d-9a63-54d1ba6c8d12"

# Bucket R2 per immagini prodotti (gratuito)
# Dopo aver abilitato R2 su dash.cloudflare.com → R2 → Create bucket "torb-images"
# Aggiungere anche il binding nel pannello Pages → Settings → Bindings → R2 → nome: IMAGES
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "torb-images"
